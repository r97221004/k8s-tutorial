apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:           # what the scheduler reserves
              cpu: 50m
              memory: 64Mi
            limits:             # the hard ceiling
              cpu: 200m
              memory: 128Mi
          startupProbe:         # give slow starters time before liveness kicks in
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:       # gate traffic until ready
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:        # restart if it goes unhealthy
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
