apiVersion: v1
kind: Namespace
metadata:
  name: security-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewer
  namespace: security-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: security-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: viewer-reads-pods
  namespace: security-demo
subjects:
  - kind: ServiceAccount
    name: viewer
    namespace: security-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
