apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-board
  labels:
    app.kubernetes.io/name: todo-board
spec:
  ingressClassName: nginx
  rules:
    - host: demo.localdev.me      # resolves to 127.0.0.1
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: todo-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-frontend
                port:
                  number: 80
