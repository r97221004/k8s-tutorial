apiVersion: apps/v1
kind: Deployment
metadata:
  name: rewrite-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rewrite-demo
  template:
    metadata:
      labels:
        app: rewrite-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27          # same image already used in the core-objects chapter
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rewrite-demo
spec:
  selector:
    app: rewrite-demo
  ports:
    - port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rewrite-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2   # $2 = the second capture group from the path regex below
spec:
  ingressClassName: nginx
  rules:
    - host: demo.localdev.me
      http:
        paths:
          - path: /rewrite-demo(/|$)(.*)   # group 1: the slash (or end); group 2: everything after it
            pathType: ImplementationSpecific
            backend:
              service:
                name: rewrite-demo
                port:
                  number: 80
