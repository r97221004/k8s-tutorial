apiVersion: batch/v1
kind: Job
metadata:
  name: pi
spec:
  backoffLimit: 4          # retry the Pod up to 4 times before marking the Job failed
  template:
    spec:
      restartPolicy: Never # required for Jobs: Never or OnFailure
      containers:
        - name: pi
          image: perl:5.40
          command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(200)"]
